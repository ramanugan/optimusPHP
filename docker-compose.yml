version: "3.8"

services:
  # Servicio de intérprete PHP-FPM
  front-app:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: front-app
    restart: always
    user: "www-data:www-data"
    volumes:
      - ./site:/var/www/html:rw
      - ./logs:/var/www/html/logs:rw
      - ./ws-logs:/var/www/html/ws-logs:rw
      - ./docs:/var/www/html/data/user/settingsUsersDocument:rw

  # Servidor web Nginx (balanceador/estáticos)
  nginx:
    image: nginx:alpine
    container_name: front-app-nginx
    restart: always
    volumes:
      - ./site:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - front-app
