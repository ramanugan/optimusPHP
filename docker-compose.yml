version: "3.8"

services:
  # Servicio de intérprete PHP-FPM
  front-app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    restart: always
    env_file:
      - .env
    volumes:
      - app-data:/var/www/html:rw
      - ./ws-logs:/var/www/html/ws-logs:rw
      - ./docs:/var/www/html/data/user/settingsUsersDocument:rw
      - php-sessions:/var/sessions:rw
    networks:
      - internal

  # Servidor web Nginx (balanceador/estáticos)
  nginx:
    image: nginx:alpine
    user: root
    restart: always
    volumes:
      - app-data:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - front-app
    networks:
      - internal
      - dokploy-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.services.optimus-nginx.loadbalancer.server.port=80"

volumes:
  app-data:
  php-sessions:

networks:
  internal:
    driver: bridge
  dokploy-network:
    external: true
    name: dokploy-network
