version: "3.8"

services:
  # Servicio de intérprete PHP-FPM
  front-app:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: front-app
    restart: always
    command: /bin/sh -c "chown -R www-data:www-data /var/www/html && php-fpm"
    env_file:
      - .env
    volumes:
      - ./site:/var/www/html:rw
      - ./logs:/var/www/html/logs:rw
      - ./ws-logs:/var/www/html/ws-logs:rw
      - ./docs:/var/www/html/data/user/settingsUsersDocument:rw

  # Servidor web Nginx (balanceador/estáticos)
  nginx:
    image: nginx:alpine
    user: root
    container_name: front-app-nginx
    command: /bin/sh -c "sed -i 's/user  nginx;/user  root;/g' /etc/nginx/nginx.conf && nginx -g 'daemon off;'"
    restart: always
    volumes:
      - ./site:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - front-app
